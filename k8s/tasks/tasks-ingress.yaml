apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasks-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: taskify.192.168.1.89.nip.io
    http:
      paths:
      - backend:
          service:
            name: tasks-service
            port:
              number: 80
        path: /api/tasks
        pathType: Prefix
